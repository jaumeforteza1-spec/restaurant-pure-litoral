<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1520;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#162A4A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1F3D6B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EAB561;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#EAB561;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#EAB561;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EAB561;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6196EA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#162A4A;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6196EA;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#6196EA;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="65%" r="40%">
      <stop offset="0%" style="stop-color:#EAB561;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#EAB561;stop-opacity:0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <clipPath id="logoClip">
      <circle cx="180" cy="315" r="74"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow orbs -->
  <ellipse cx="300" cy="250" rx="400" ry="350" fill="url(#glow1)"/>
  <ellipse cx="960" cy="410" rx="320" ry="280" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Decorative grid lines (subtle) -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#6196EA" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#EAB561" stroke-width="0.4" stroke-opacity="0.06"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#EAB561" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Logo circle -->
  <circle cx="180" cy="315" r="78" fill="rgba(255,255,255,0.97)" clip-path="url(#logoClip)"/>
  <image href="./logo-alt/logo-alt.png" x="106" y="241" width="148" height="148" clip-path="url(#logoClip)"/>
  <circle cx="180" cy="315" r="78" fill="none" stroke="#EAB561" stroke-width="2.5"/>
  <circle cx="180" cy="315" r="86" fill="none" stroke="#EAB561" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Vertical separator -->
  <line x1="310" y1="180" x2="310" y2="450" stroke="#EAB561" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- Eyebrow label -->
  <text x="360" y="222" font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#ADC8F5" letter-spacing="5" opacity="0.85">LITORAL RESTAURANT-CAFÈ</text>

  <!-- Main title: PURE -->
  <text x="354" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="700" fill="#FFFFFF" letter-spacing="-2">PURE</text>

  <!-- Main title: Litoral (italic, gold) -->
  <text x="362" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="400" font-style="italic" fill="#EAB561" letter-spacing="2">Litoral</text>

  <!-- Gold divider line -->
  <rect x="360" y="432" width="420" height="1.5" fill="url(#goldLine)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="360" y="472" font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="4">SA RÀPITA · MALLORCA · MEDITERRÀNIA</text>

  <!-- Bottom tagline -->
  <text x="600" y="576" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-style="italic" font-weight="300" fill="rgba(255,255,255,0.3)" letter-spacing="1">On la mar és part del menú</text>

  <!-- Corner decoration top-right -->
  <circle cx="1150" cy="80" r="60" fill="none" stroke="#EAB561" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="1150" cy="80" r="40" fill="none" stroke="#EAB561" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Corner decoration bottom-right -->
  <circle cx="1100" cy="580" r="80" fill="none" stroke="#6196EA" stroke-width="0.8" stroke-opacity="0.1"/>
</svg>
